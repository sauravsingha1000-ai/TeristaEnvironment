name: Build Terista Environment APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Accept all Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK 29 and CMake
        run: |
          sdkmanager "ndk;29.0.13846066" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.13846066" >> $GITHUB_ENV

      # 🔴 REQUIRED for debug build
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ ONLY DEBUG BUILD
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List built APKs
        run: find ./app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Find APK path
        id: apk_paths
        run: |
          DEBUG_APK=$(find ./app/build/outputs/apk/debug -name "*.apk" | sort | head -n 1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "Found Debug: $DEBUG_APK"

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeristaEnvironment-Debug
          path: ${{ steps.apk_paths.outputs.debug_apk }}
          retention-days: 30
          if-no-files-found: error

      # 🔥 Release creation only uploads debug APK now
      - name: Create GitHub Release (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Terista Environment v1.0.${{ github.run_number }}"
          body: |
            ## Terista Environment Debug Build

            Built from commit: ${{ github.sha }}

            ⚠️ This is a debug APK (not for Play Store)
          files: |
            ${{ steps.apk_paths.outputs.debug_apk }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
