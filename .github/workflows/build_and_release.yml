name: Build Terista Environment APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    # 🔐 Use secrets for signing
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Accept all Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK 29 and CMake
        run: |
          sdkmanager "ndk;29.0.13846066" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.13846066" >> $GITHUB_ENV

      # 🔥 Decode your keystore (VERY IMPORTANT)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 🚀 BUILD RELEASE APK (SIGNED)
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: find ./app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Find APK path
        id: apk_paths
        run: |
          RELEASE_APK=$(find ./app/build/outputs/apk/release -name "*.apk" | sort | head -n 1)
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "Found Release: $RELEASE_APK"

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeristaEnvironment-Release
          path: ${{ steps.apk_paths.outputs.release_apk }}
          retention-days: 30
          if-no-files-found: error

      # 📦 Create GitHub Release (manual trigger)
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Terista Environment v1.0.${{ github.run_number }}"
          body: |
            ## Terista Environment Release Build

            Built from commit: ${{ github.sha }}

            ✅ Signed Release APK
          files: |
            ${{ steps.apk_paths.outputs.release_apk }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
